<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Keenoo ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Floating Hearts Background -->
<div id="floatingHearts"></div>

<!-- ========================= -->
<!-- PIN SCREEN -->
<!-- ========================= -->
<section id="pinScreen" class="screen active">

    <div class="glass-card">

        <div class="lock-icon">🔒</div>

        <h2>Enter Secret PIN</h2>

        <div class="pin-dots">
            <span id="dot1"></span>
            <span id="dot2"></span>
            <span id="dot3"></span>
            <span id="dot4"></span>
        </div>

        <div class="heart-keypad">

            <button onclick="enterPin('1')">❤️<span>1</span></button>
            <button onclick="enterPin('2')">❤️<span>2</span></button>
            <button onclick="enterPin('3')">❤️<span>3</span></button>

            <button onclick="enterPin('4')">❤️<span>4</span></button>
            <button onclick="enterPin('5')">❤️<span>5</span></button>
            <button onclick="enterPin('6')">❤️<span>6</span></button>

            <button onclick="enterPin('7')">❤️<span>7</span></button>
            <button onclick="enterPin('8')">❤️<span>8</span></button>
            <button onclick="enterPin('9')">❤️<span>9</span></button>

            <button class="deleteBtn" onclick="deletePin()">⌫</button>

            <button onclick="enterPin('0')">❤️<span>0</span></button>

            <button class="clearBtn" onclick="clearPin()">C</button>

        </div>

    </div>

</section>

<!-- ========================= -->
<!-- STORY SCREEN -->
<!-- ========================= -->
<section id="storyScreen" class="screen">

    <img id="storyImage" src="assets/story1.jpg">

    <div id="storyPopup" class="storyPopup">
        Blow The Candles ✨🕯️
    </div>

</section>

<!-- ========================= -->
<!-- SLIDESHOW SCREEN -->
<!-- ========================= -->
<section id="slideshowScreen" class="screen">

    <div class="slideshow-card">

        <img id="slideImage">

        <video id="slideVideo" controls></video>

    </div>

</section>

<!-- ========================= -->
<!-- GIFTS SCREEN -->
<!-- ========================= -->
<section id="giftScreen" class="screen">

    <h2>Choose A Gift 🎁</h2>

    <div class="gift-container">

        <div class="gift-box" onclick="openGift(1)">
            🎁
        </div>

        <div class="gift-box" onclick="openGift(2)">
            🎁
        </div>

        <div class="gift-box" onclick="openGift(3)">
            🎁
        </div>

    </div>

</section>

<!-- ========================= -->
<!-- GIFT CONTENT SCREEN -->
<!-- ========================= -->
<section id="giftContentScreen" class="screen">

    <div id="giftData"></div>

    <button class="backBtn" onclick="backToGifts()">
        ⬅ Back
    </button>

</section>

<!-- ========================= -->
<!-- LETTER SCREEN -->
<!-- ========================= -->
<section id="letterScreen" class="screen">

    <div class="letterCard">

        <h2>💌 Letter For Keenoo</h2>

        <div id="letterText"></div>

    </div>

    <button class="nextArrow" onclick="goNextPage()">
        ➡️
    </button>

</section>

<script src="script.js"></script>

</body>
</html>
